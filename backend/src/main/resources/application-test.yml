server:
  port: 0

spring:
  application:
    name: ar-navigation-test

  datasource:
    driver-class-name: org.h2.Driver
    url: "jdbc:h2:mem:ar_navigation_test;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1;INIT=RUNSCRIPT FROM 'file:./sql/2026-03-18-unified-user-center.sql'"
    username: sa
    password:

  h2:
    console:
      enabled: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
